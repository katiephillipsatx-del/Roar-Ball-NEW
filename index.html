<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoarBall 2K26</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Main Menu -->
        <section id="main-menu" class="screen active">
            <div class="video-background">
                <!-- We will use the generated cover image as a dynamic background -->
                <img id="menu-bg" src="" alt="RoarBall Background">
                <div class="overlay"></div>
            </div>
            
            <div class="menu-content">
                <div class="logo-container">
                    <h1 class="glitch" data-text="ROARBALL">ROARBALL</h1>
                    <h2 class="edition">2K26</h2>
                </div>
                
                <nav class="main-nav">
                    <button class="menu-btn primary" onclick="startGame()">PLAY NOW</button>
                    <button class="menu-btn" onclick="showRoster()">ROSTER</button>
                    <button class="menu-btn" onclick="showOptions()">OPTIONS</button>
                    <button class="menu-btn" onclick="quitGame()">QUIT</button>
                </nav>
            </div>
            
            <div class="player-showcase">
                <img id="showcase-player" src="" alt="Featured Player">
                <div class="player-info">
                    <h3>WILL HARRIS</h3>
                    <p>OVR: 85 | GOAT</p>
                </div>
            </div>
        </section>

        <!-- In-Game UI HUD -->
        <section id="hud" class="screen hidden">
            <div class="scoreboard">
                <div class="team away">
                    <span class="abbr" id="t1-name">MAG</span>
                    <span class="score" id="away-score">0</span>
                </div>
                <div class="time-block">
                    <span class="quarter">Q<span id="qtr-disp">1</span></span>
                    <span class="clock" id="game-clock">12:00</span>
                    <span class="shot-clock" id="shot-clock" style="color:red; font-size:1rem;">24.0</span>
                </div>
                <div class="team home">
                    <span class="score" id="home-score">0</span>
                    <span class="abbr" id="t2-name">THO</span>
                </div>
            </div>
            
            <div class="player-indicator" id="player-indicator">
                <span id="active-player-name">W. Harris</span>
                <div class="stamina-bar"><div class="stamina-fill"></div></div>
            </div>
            
            <div id="shot-meter-ui" style="display:none; position:absolute; bottom:120px; left:50%; transform:translateX(-50%); width:30px; height:150px; background:rgba(0,0,0,0.8); border:2px solid rgba(255,255,255,0.2); border-radius:4px;">
                <div id="shot-fill" style="width:100%; height:0%; background:linear-gradient(to top, red, yellow, green, yellow, red); position:absolute; bottom:0; transition: height 0.1s;"></div>
                <div style="position:absolute; top:25%; left:0; width:100%; height:10%; background:rgba(255,255,255,0.4);"></div> <!-- Perfect release window -->
            </div>
            
            <div id="labels" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50;"></div>
            
            <div id="sub-panel" style="display:none; position:absolute; top:15%; left:20%; width:60%; height:70%; background:var(--dark-panel); backdrop-filter:blur(10px); z-index:100; color:white; border:1px solid var(--glass-border); border-radius:8px; padding:30px; overflow-y:auto;">
                <h2 style="font-size:2rem; margin-bottom:20px; color:var(--primary);">SUBSTITUTIONS</h2>
                <div style="display:flex; justify-content:space-between;">
                    <div style="width:48%;">
                        <h3 id="t1-bench" style="color:#aaa; margin-bottom:10px;">Bench:</h3>
                        <div id="t1-court" style="display:flex; flex-direction:column; gap:10px;"></div>
                    </div>
                    <div style="width:48%;">
                        <h3 id="t2-bench" style="color:#aaa; margin-bottom:10px;">Bench:</h3>
                        <div id="t2-court" style="display:flex; flex-direction:column; gap:10px;"></div>
                    </div>
                </div>
                <button class="menu-btn primary" style="margin-top:30px;" onclick="document.getElementById('sub-panel').style.display='none'">RETURN TO GAME</button>
            </div>
            
            <canvas id="game-canvas"></canvas>
        </section>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <script src="glbData.js"></script>
    <script src="data.js"></script>
    <script src="game.js"></script>
    <script src="app.js"></script>
</body>
</html>
